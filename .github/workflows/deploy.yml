name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Install Functions Dependencies
        working-directory: functions
        run: npm ci
      
      - name: Create backend .env file
        working-directory: functions
        run: |
          echo "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}" > .env
          echo "STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}" >> .env
          echo "ZODOMUS_API_KEY=${{ secrets.ZODOMUS_API_KEY }}" >> .env
          echo "ZODOMUS_CHANNEL_ID=${{ secrets.ZODOMUS_CHANNEL_ID }}" >> .env

      - name: Build Frontend
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          # ... (vos autres variables d'environnement) ...

      # 1. On utilise l'auth officielle Google (comme sur les snacks)
      - name: Google auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}

      # 2. On installe firebase-tools localement
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # 3. On déploie uniquement ce qu'on veut (Hosting et Functions)
      - name: Deploy Hosting & Functions
        run: firebase deploy --only hosting,functions --project locationbibi