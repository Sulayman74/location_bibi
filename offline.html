<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hors ligne – La Cabine du Cap d'Agde</title>
  <meta name="theme-color" content="#d97706" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="/src/styles/main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html { font-family: 'Inter', sans-serif; }
    .wifi-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
  </style>
</head>
<body class="bg-stone-100 text-stone-800 min-h-screen flex flex-col">
  <header class="bg-white shadow-sm px-4 py-3 flex items-center gap-2">
    <div class="w-8 h-8 rounded-full bg-amber-500 flex items-center justify-center text-white font-bold text-sm">KP</div>
    <span class="font-serif font-semibold">La Cabine du Cap d'Agde</span>
  </header>

  <main class="flex-1 flex items-center justify-center px-4">
    <div class="text-center max-w-sm">
      <div class="text-6xl mb-5">📵</div>
      <h1 class="font-serif text-2xl font-bold mb-3">Mode hors ligne</h1>
      <p class="text-stone-500 mb-6 text-sm leading-relaxed">
        Vous n'êtes pas connecté à Internet. Le code WiFi est toujours disponible ci-dessous s'il a été chargé précédemment.
      </p>

      <!-- Cached WiFi Code -->
      <div id="cached-wifi" class="hidden wifi-card rounded-2xl p-5 text-white text-left mb-5">
        <div class="text-white/60 text-xs uppercase tracking-wider mb-1">Réseau</div>
        <div id="offline-ssid" class="font-semibold mb-3 text-base"></div>
        <div class="text-white/60 text-xs uppercase tracking-wider mb-1">Mot de passe</div>
        <div id="offline-password" class="font-mono text-xl font-bold tracking-widest"></div>
        <div class="text-xs text-white/40 mt-3">(chargé en cache)</div>
      </div>

      <div id="no-cached-wifi" class="bg-white rounded-2xl p-5 text-sm text-stone-500 mb-5">
        Le code WiFi n'est pas disponible hors ligne. Connectez-vous pour y accéder.
      </div>

      <button onclick="window.location.reload()" class="bg-amber-500 hover:bg-amber-600 text-white font-semibold px-6 py-3 rounded-xl transition w-full">
        Réessayer la connexion
      </button>
      <a href="/" class="block mt-3 text-amber-600 text-sm underline">Retour à l'accueil</a>
    </div>
  </main>

  <script>
    // Try to load cached WiFi data
    const wifi = JSON.parse(localStorage.getItem('villa_wifi') || 'null');
    if (wifi && wifi.ssid && wifi.password) {
      document.getElementById('cached-wifi').classList.remove('hidden');
      document.getElementById('no-cached-wifi').classList.add('hidden');
      document.getElementById('offline-ssid').textContent = wifi.ssid;
      document.getElementById('offline-password').textContent = wifi.password;
    }
  </script>
</body>
</html>
